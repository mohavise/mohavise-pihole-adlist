name: Update Pi-hole Adlist

on:
  workflow_dispatch:
  schedule:
    # 03:30 Asia/Tehran = 00:00 UTC. Runs after the core repo updates.
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-adlist:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pi-hole adlist
        shell: pwsh
        run: ./scripts/build-pihole-adlist.ps1

      - name: Commit updated adlist
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pihole-adlist.txt pihole-hosts.txt
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "Update Pi-hole adlist"
          git push
