name: Update Pi-hole Adlist

on:
  workflow_dispatch:
  schedule:
    # 03:30 Asia/Tehran = 00:00 UTC. Runs after the core repo updates.
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-pihole-adlist
  cancel-in-progress: false

jobs:
  update-adlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and validate Pi-hole adlists
        run: bash ./scripts/build-pihole-adlist.sh

      - name: Commit updated adlists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pihole-adlist.txt pihole-adblock-adlist.txt pihole-adult-adlist.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Pi-hole adlists"
          git pull --rebase origin main
          git push origin main
