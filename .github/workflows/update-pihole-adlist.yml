name: Update Pi-hole Adlist

on:
  workflow_dispatch:
  schedule:
    # 03:30 Asia/Tehran = 00:00 UTC. Runs after the core repo updates.
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-adlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pi-hole adlist
        run: bash ./scripts/build-pihole-adlist.sh

      - name: Commit updated Pi-hole adlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pihole-adblock-adlist.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update Pi-hole adlist"
          git push
